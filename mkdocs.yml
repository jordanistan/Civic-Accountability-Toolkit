site_name: Civic Accountability Toolkit
site_description: Evidence-first research database for civic oversight.
site_url: https://jordanistan.github.io/Civic-Accountability-Toolkit/

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - People: people.md
  - Incidents: incidents.md
  - Issues: issues.md
  - Statutes: statutes.md
  - Agencies: agencies.md
  - Verification Standards: SOURCE_STANDARDS.md

markdown_extensions:
  - tables
  - attr_list
  - md_in_html
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.magiclink
  - pymdownx.tasklist

use_directory_urls: true
